name: catch-catch
options:
  bundleIdPrefix: com.team
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15"

schemes:
  catch-catch:
    build:
      targets:
        catch-catch: all
    run:
      config: Debug
    archive:
      config: Release

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES

targets:
  catch-catch:
    type: application
    platform: macOS
    sources:
      - path: catch-catch
        excludes:
          - "**/*.md"
    dependencies:
      - package: Sparkle
        product: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.team.catch-catch
        INFOPLIST_FILE: catch-catch/Info.plist
        CODE_SIGN_ENTITLEMENTS: catch-catch/catch-catch.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    preBuildScripts: []
